<script>
  (function () {
    const logoTrigger = document.getElementById("logoTrigger");
    const overlay = document.getElementById("ncGameOverlay");
    const closeBtn = document.getElementById("ncGameClose");
    const startBtn = document.getElementById("ncStartGame");
    const restartBtn = document.getElementById("ncRestartGame");
    const arena = document.getElementById("ncGameArena");
    const scoreEl = document.getElementById("ncScore");
    const highScoreEl = document.getElementById("ncHighScore");
    const livesEl = document.getElementById("ncLives");
    const levelEl = document.getElementById("ncLevel");
    const statusEl = document.getElementById("ncGameStatus");

    const STORAGE_KEY = "naturalchoice_logo_game_highscore";
    let highScore = Number(localStorage.getItem(STORAGE_KEY) || 0);

    let score = 0;
    let lives = 3;
    let level = 1;
    let running = false;
    let spawnTimer = null;

    let clickCount = 0;
    let clickResetTimer = null;
    let singleClickTimer = null;

    highScoreEl.textContent = highScore;

    function openGame() {
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
      document.body.classList.add("nc-lock-scroll");
    }

    function closeGame() {
      stopGame();
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");
      document.body.classList.remove("nc-lock-scroll");
    }

    function resetStats() {
      score = 0;
      lives = 3;
      level = 1;
      updateStats();
      statusEl.textContent = "Catch the logos before they disappear.";
      arena.innerHTML = "";
    }

    function updateStats() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      levelEl.textContent = level;
      highScoreEl.textContent = highScore;
    }

    function getSpawnInterval() {
      return Math.max(420, 1200 - (level - 1) * 85);
    }

    function getLogoLifetime() {
      return Math.max(650, 1800 - (level - 1) * 95);
    }

    function getLogoSize() {
      return Math.max(34, 72 - (level - 1) * 2);
    }

    function getLogosPerWave() {
      return Math.min(4, 1 + Math.floor((level - 1) / 3));
    }

    function updateLevel() {
      level = 1 + Math.floor(score / 8);
      updateStats();
    }

    function handleMiss() {
      if (!running) return;
      lives -= 1;
      updateStats();
      if (lives <= 0) gameOver();
    }

    function gameOver() {
      stopGame();
      if (score > highScore) {
        highScore = score;
        localStorage.setItem(STORAGE_KEY, String(highScore));
        highScoreEl.textContent = highScore;
        statusEl.textContent = "New high score. Respect.";
      } else {
        statusEl.textContent = "Game over. Try again.";
      }
    }

    function removeLogo(node, missed = false) {
      if (!node || !node.parentNode) return;
      node.parentNode.removeChild(node);
      if (missed) handleMiss();
    }

    function spawnLogo() {
      if (!running) return;

      const arenaRect = arena.getBoundingClientRect();
      const size = getLogoSize();
      const maxX = Math.max(0, arenaRect.width - size);
      const maxY = Math.max(0, arenaRect.height - size);

      const logo = document.createElement("button");
      logo.type = "button";
      logo.className = "nc-target";
      logo.style.width = size + "px";
      logo.style.height = size + "px";
      logo.style.left = Math.random() * maxX + "px";
      logo.style.top = Math.random() * maxY + "px";

      const img = document.createElement("img");
      img.src = "logo.png";
      img.alt = "Naturalchoice target";
      logo.appendChild(img);

      logo.addEventListener("click", function () {
        if (!running) return;
        score += 1;
        updateLevel();
        updateStats();
        removeLogo(logo, false);

        if (score > highScore) {
          highScore = score;
          localStorage.setItem(STORAGE_KEY, String(highScore));
          highScoreEl.textContent = highScore;
        }
      });

      arena.appendChild(logo);

      const lifetime = getLogoLifetime();
      window.setTimeout(function () {
        if (logo.parentNode) removeLogo(logo, true);
      }, lifetime);
    }

    function gameLoop() {
      if (!running) return;

      const count = getLogosPerWave();
      for (let i = 0; i < count; i += 1) spawnLogo();

      spawnTimer = window.setTimeout(gameLoop, getSpawnInterval());
    }

    function stopGame() {
      running = false;
      if (spawnTimer) {
        clearTimeout(spawnTimer);
        spawnTimer = null;
      }
      arena.innerHTML = "";
    }

    function startGame() {
      stopGame();
      resetStats();
      running = true;
      statusEl.textContent = "Game on.";
      gameLoop();
    }

    logoTrigger.addEventListener("click", function (event) {
      event.preventDefault();

      clickCount += 1;

      if (clickResetTimer) clearTimeout(clickResetTimer);
      clickResetTimer = setTimeout(function () {
        clickCount = 0;
      }, 500);

      if (singleClickTimer) clearTimeout(singleClickTimer);

      if (clickCount === 3) {
        clickCount = 0;
        openGame();
        return;
      }

      singleClickTimer = setTimeout(function () {
        if (clickCount < 3) {
          window.location.href = logoTrigger.getAttribute("href");
        }
      }, 520);
    });

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);
    closeBtn.addEventListener("click", closeGame);

    overlay.addEventListener("click", function (event) {
      if (event.target === overlay) closeGame();
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && overlay.classList.contains("is-open")) {
        closeGame();
      }
    });
  })();
</script>
